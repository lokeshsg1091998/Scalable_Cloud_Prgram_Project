<!DOCTYPE html>
<html>
<head>
    <title>Financial Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header class="hero">
    <h1>💼 Financial Computing Platform</h1>
    <p>Smart Financial Services Dashboard</p>
</header>

<div class="dashboard-grid">

    <div class="card service-card" onclick="location.href='/tax-page'">
        <h2>📊 Tax Calculator</h2>
        <p>Compute Irish taxes with real-time breakdown</p>
        <button class="service-btn">Open</button>
    </div>

    <div class="card service-card" onclick="location.href='/insurance-page'">
        <h2>🛡 Insurance Calculator</h2>
        <p>Estimate premium based on profile</p>
        <button class="service-btn">Open</button>
    </div>

    <div class="card service-card" onclick="location.href='/loan-page'">
        <h2>🏠 Loan Calculator</h2>
        <p>Calculate EMI and repayment details</p>
        <button class="service-btn">Open</button>
    </div>

</div>

</html>
