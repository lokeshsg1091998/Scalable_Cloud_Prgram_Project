name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Tests
      run: |
        # Run tests if pytest is available or standard unittest
        # pytest
        python -m unittest discover -s tests || echo "No tests found or tests failed"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1
        
    - name: Create deployment package
      run: |
        zip -r Finance_calcy.zip . \
        -x "*.git*" \
        -x "venv/*" \
        -x "__pycache__/*" \
        -x "*.pyc" \
        -x ".github/*"

    - name: Upload to S3
      run: |
        aws s3 cp Finance_calcy.zip \
        s3://elasticbeanstalk-us-east-1-766907158656/Finance_calcy.zip

    - name: Create new EB version
      run: |
        aws elasticbeanstalk create-application-version \
          --application-name Finance-calculators \
          --version-label v-${{ github.run_number }} \
          --source-bundle S3Bucket="elasticbeanstalk-us-east-1-766907158656",S3Key="Finance_calcy.zip"

    - name: Deploy to Elastic Beanstalk
      run: |
        aws elasticbeanstalk update-environment \
          --environment-name Finance-calculators-env \
          --version-label v-${{ github.run_number }}
